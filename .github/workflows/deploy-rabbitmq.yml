name: Deploy RabbitMQ

on:
  workflow_dispatch:

jobs:
  build-rabbitmq:
    name: Build RabbitMQ Image
    runs-on: ubuntu-latest

    env:
      RABBITMQ_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnative-rabbitmq
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push RabbitMQ image
        uses: docker/build-push-action@v6
        with:
          context: ./rabbitmq
          push: true
          tags: |
            ${{ env.RABBITMQ_IMAGE }}:latest
            ${{ env.RABBITMQ_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy-rabbitmq:
    name: Deploy RabbitMQ on EC2
    runs-on: ubuntu-latest
    needs: build-rabbitmq

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy RabbitMQ compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/compose.rabbitmq.yml"
          target: "/opt/cloudnative-rabbitmq"

      - name: Deploy RabbitMQ container
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,RABBITMQ_USERNAME,RABBITMQ_PASSWORD
          script: |
            set -e

            mkdir -p /opt/cloudnative-rabbitmq
            cd /opt/cloudnative-rabbitmq

            docker network create cloudnative-net || true

            cat > .env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            EOF

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose -f deploy/compose.rabbitmq.yml --env-file .env pull
            docker compose -f deploy/compose.rabbitmq.yml --env-file .env up -d

            docker ps --filter name=rabbitmq-cloudnative
